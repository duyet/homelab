apiVersion: apps/v1
kind: Deployment
metadata:
  name: github-runner
  namespace: github-actions
  labels:
    app: github-runner
spec:
  replicas: 2
  selector:
    matchLabels:
      app: github-runner
  template:
    metadata:
      labels:
        app: github-runner
    spec:
      terminationGracePeriodSeconds: 90
      containers:
        - name: runner
          image: myoung34/github-runner:latest
          imagePullPolicy: Always
          env:
            - name: RUNNER_SCOPE
              value: "repo"
            - name: REPO_URL
              value: "https://github.com/duyet/tikduni"
            - name: RUNNER_NAME_PREFIX
              value: "homelab"
            - name: RUNNER_LABELS
              value: "self-hosted,linux,homelab"
            - name: EPHEMERAL
              value: "true"
            - name: DISABLE_AUTOMATIC_DEREGISTRATION
              value: "false"
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: github-runner-secret
                  key: GITHUB_TOKEN
          # Docker-in-Docker: mount host docker socket so CI jobs can run docker build
          volumeMounts:
            - name: dockersock
              mountPath: /var/run/docker.sock
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 4Gi
      volumes:
        - name: dockersock
          hostPath:
            path: /var/run/docker.sock
