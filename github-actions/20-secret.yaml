# Create this secret manually — do NOT commit the real PAT value.
# Run: kubectl create secret generic github-runner-secret \
#        --namespace github-actions \
#        --from-literal=GITHUB_TOKEN=<your-PAT-with-repo-scope>
#
# The PAT needs: repo scope (for private repos) or public_repo for public.
# Token is used only for runner registration, not stored in the runner itself.
apiVersion: v1
kind: Secret
metadata:
  name: github-runner-secret
  namespace: github-actions
type: Opaque
stringData:
  GITHUB_TOKEN: "REPLACE_ME"
