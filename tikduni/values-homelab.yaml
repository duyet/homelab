# Homelab-specific overrides for tikduni Helm chart
replicaCount: 1

image:
  repository: ghcr.io/duyet/tikduni-web
  tag: "latest"
  pullPolicy: Always

ingress:
  enabled: true
  className: ""
  hosts:
    - host: tikduni.local
      paths:
        - path: /
          pathType: Prefix

persistence:
  enabled: true
  storageClass: "microk8s-hostpath"
  size: 20Gi

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi
